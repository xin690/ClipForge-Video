# ClipForge 配置模板 — 复制为 config.yaml 后修改
app:
  name: ClipForge
  version: 0.3.0

paths:
  assets: ./assets
  scripts: ./scripts
  output: ./output
  cache: ./cache
  database: ./database/clipforge.db

video:
  width: 1920
  height: 1080
  fps: 30
  preset: veryfast
  crf: 23

tts:
  engine: edge-tts
  voice: zh-CN-XiaoxiaoNeural
  speed: 1.0

subtitle:
  engine: text
  font_family: Microsoft YaHei
  font_size: 36
  font_color: "#FFFFFF"
  bold: false
  outline: 2
  shadow: 1
  position: bottom
  animation: none
  whisper_model: tiny
  device: cpu

ai:
  enabled: false
  provider: openai
  api_key: ""
  model: gpt-4o-mini
  max_tokens: 500
  max_versions: 2
  critique_enabled: true
  token_guard:
    max_per_session: 4000
    warning_at: 0.7
    cache_ttl_critique: 3600
    cache_ttl_plan: 604800
    debounce_seconds: 3.0

qa:
  preset: tiktok
  auto_checks: true

downloader:
  provider: pexels
  api_key: ""
  max_per_query: 3
  min_width: 1920
  timeout: 120

bgm:
  volume: 0.3

logging:
  level: INFO
