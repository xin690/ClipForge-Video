# ClipForge 配置模板 — 复制为 config.yaml 后修改
app:
  name: ClipForge
  version: 0.3.0

paths:
  assets: ./assets
  scripts: ./scripts
  output: ./output
  cache: ./cache
  database: ./database/clipforge.db

video:
  width: 1920
  height: 1080
  fps: 30
  preset: veryfast
  crf: 23

tts:
  engine: edge-tts
  voice: zh-CN-XiaoxiaoNeural
  speed: 1.0

subtitle:
  engine: text
  font_family: Microsoft YaHei
  font_size: 36
  font_color: "#FFFFFF"
  bold: false
  outline: 2
  shadow: 1
  position: bottom
  margin_v: 10
  animation: none
  whisper_model: tiny
  device: cpu

ai:
  enabled: false
  provider: openai
  api_key: ""
  model: gpt-4o-mini
  max_versions: 2
  critique_enabled: true

qa:
  preset: tiktok
  auto_checks: true
  presets:
    tiktok:
      segment_min: 3
      segment_max: 8
      duration_per_seg_min: 2
      duration_per_seg_max: 10
      total_duration_max: 120
      text_min_len: 10
      text_max_len: 150
      min_keywords: 2
      duration_tolerance: 5
    youtube:
      segment_min: 3
      segment_max: 15
      duration_per_seg_min: 3
      duration_per_seg_max: 15
      total_duration_max: 1200
      text_min_len: 15
      text_max_len: 200
      min_keywords: 2
      duration_tolerance: 10
    commerce:
      segment_min: 2
      segment_max: 6
      duration_per_seg_min: 3
      duration_per_seg_max: 12
      total_duration_max: 60
      text_min_len: 5
      text_max_len: 100
      min_keywords: 3
      duration_tolerance: 3

downloader:
  provider: pexels
  api_key: ""
  max_per_query: 3
  min_width: 1920
  timeout: 120

bgm:
  volume: 0.3

logging:
  level: INFO
