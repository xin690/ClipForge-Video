# ClipForge 配置模板 — 复制为 config.yaml 后修改
app:
  name: ClipForge
  version: 0.4.0

paths:
  assets: ./assets
  scripts: ./scripts
  output: ./output
  cache: ./cache
  database: ./database/clipforge.db

video:
  width: 1920
  height: 1080
  fps: 30
  preset: veryfast
  crf: 23

tts:
  engine: edge-tts
  voice: zh-CN-XiaoxiaoNeural
  speed: 1.0

subtitle:
  engine: text
  font_family: Microsoft YaHei
  font_size: 36
  font_color: "#FFFFFF"
  bold: false
  outline: 2
  shadow: 1
  position: bottom
  margin_v: 10
  animation: none
  whisper_model: tiny
  device: cpu

ai:
  enabled: false
  provider: openai
  api_key: ""
  model: gpt-4o-mini
  max_versions: 2
  critique_enabled: true

qa:
  preset: tiktok
  auto_checks: true
  presets:
    tiktok:
      segment_min: 3
      segment_max: 8
      duration_per_seg_min: 2
      duration_per_seg_max: 10
      total_duration_max: 120
      text_min_len: 10
      text_max_len: 150
      min_keywords: 2
      duration_tolerance: 5
    youtube:
      segment_min: 3
      segment_max: 15
      duration_per_seg_min: 3
      duration_per_seg_max: 15
      total_duration_max: 1200
      text_min_len: 15
      text_max_len: 200
      min_keywords: 2
      duration_tolerance: 10
    commerce:
      segment_min: 2
      segment_max: 6
      duration_per_seg_min: 3
      duration_per_seg_max: 12
      total_duration_max: 60
      text_min_len: 5
      text_max_len: 100
      min_keywords: 3
      duration_tolerance: 3

downloader:
  provider: pexels
  api_key: ""
  max_per_query: 3
  min_width: 1920
  timeout: 120

bgm:
  volume: 0.3

visual:
  beat_sync: false
  beat_sync_method: librosa
  beat_detection_sensitivity: 0.8
  strong_beat_transition: circleopen
  weak_beat_transition: dissolve
  transition_duration: 0.4
  color:
    enable_emotion_grading: true
    lut_path: ""
    vibrance: 0.3
  camera:
    zoom_speed: 0.0015
    max_zoom: 1.5
    pan_speed: 0.2
  semantic:
    min_confidence: 0.3
    warn_below: 0.5
    keyword_expand_from_text: true

scanner:
  content_analysis: false

logging:
  level: INFO
